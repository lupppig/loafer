name: Excel Inventory → CSV
source:
  type: excel
  path: ../data/inventory_data.xlsx
  sheet: Inventory

target:
  type: csv
  path: ../output/inventory_flat.csv

transform:
  type: ai
  instruction: "convert is_active column to 0 or 1 to represent true false value"

llm:
  provider: gemini
  model: gemini-2.0-flash
mode: etl
chunk_size: 5000
