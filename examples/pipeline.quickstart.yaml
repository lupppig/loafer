# Quickstart: ETL from CSV to JSON using a custom Python transform.
# No external services or API keys required — runs entirely on local files.
#
# Run it:
#   uv run loafer run examples/pipeline.quickstart.yaml --verbose
#   uv run loafer run examples/pipeline.quickstart.yaml --dry-run
#   uv run loafer validate examples/pipeline.quickstart.yaml
#
# Note: Loafer auto-detects connector types from file extensions and URL
# schemes. The `type` field is optional — it's inferred from .csv, .json, etc.

name: Quickstart ETL

source:
  path: examples/data/sample.csv

target:
  path: examples/output/output.json

transform:
  path: examples/transforms/sample_transform.py

mode: etl
chunk_size: 500

validation:
  max_null_rate: 0.5
  strict: false
