services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: loafer
      POSTGRES_PASSWORD: loafer
      POSTGRES_DB: loafer_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loafer -d loafer_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: loafer
      MONGO_INITDB_ROOT_PASSWORD: loafer
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  loafer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    volumes:
      - ../examples:/app/examples
      - loafer_data:/root/.loafer
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  loafer_data:
