name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --cov=loafer --cov-report=term-missing

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: loafer
          POSTGRES_PASSWORD: loafer
          POSTGRES_DB: loafer_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loafer -d loafer_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      mongo:
        image: mongo:6
        env:
          MONGO_INITDB_ROOT_USERNAME: loafer
          MONGO_INITDB_ROOT_PASSWORD: loafer
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v -m integration
        env:
          POSTGRES_URL: postgresql://loafer:loafer@localhost:5432/loafer_dev
          MONGO_URL: mongodb://loafer:loafer@localhost:27017

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-integration]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: loafer
          POSTGRES_PASSWORD: loafer
          POSTGRES_DB: loafer_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loafer -d loafer_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v -m e2e
        env:
          POSTGRES_URL: postgresql://loafer:loafer@localhost:5432/loafer_dev
