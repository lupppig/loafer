name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/loafer-etl
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest tests/unit/ -v

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish --token "${{ secrets.PYPI_API_TOKEN }}"
